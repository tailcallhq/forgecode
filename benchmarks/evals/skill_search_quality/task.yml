# Skill Search Quality Eval - Task Definition
#
# This eval validates that the skill_search tool correctly identifies
# and ranks relevant skills from the available skill library based on the
# user's task description.
#
# Before running forge, skills are downloaded from 9 GitHub repos into
# ~/forge/skills/, giving the model 100+ real skills to search over.
#
# Repos downloaded (and their skill counts):
#   anthropics/skills           17 skills  (pdf, docx, pptx, xlsx, webapp-testing, mcp-builder, ...)
#   obra/superpowers            14 skills  (test-driven-development, systematic-debugging, writing-plans, ...)
#   vercel-labs/agent-skills     7 skills  (deploy-to-vercel, vercel-react-best-practices, web-design-guidelines, ...)
#   vercel-labs/next-skills      3 skills  (next-best-practices, next-cache-components, next-upgrade)
#   antfu/skills                17 skills  (vue, vite, vitest, nuxt, pinia, vitepress, ...)
#   coreyhaines31/marketingskills 34 skills (seo-audit, copywriting, content-strategy, ...)
#   supabase/agent-skills        1 skill   (supabase-postgres-best-practices)
#   shadcn/ui                    1 skill   (shadcn)
#   vercel/turborepo             1 skill   (turborepo)
#   vercel/ai                    8 skills  (ai-sdk, add-function-examples, ...)
# Total: ~103 skills
#
# Validation Strategy:
# 1. Check that skill_search tool was called (deterministic jq check)
# 2. Check that skill_search did NOT return an error
# 3. Check that all expected_skills appear in the results
# 4. Check that must_be_first skill is ranked #1
#
# If skill_search returns a tool_call_error (auth failure, backend down, etc.)
# the eval FAILS — a broken backend is a real bug, not something to skip over.

run:
  - git clone --depth=1 --branch main https://github.com/antinomyhq/forge .
  # Download skills from skills.sh GitHub repos into forge's global skills dir.
  # The `skills` CLI does not know about forge as an agent, so we clone source
  # repos and copy the skills/ subdirectory contents manually.
  - mkdir -p ~/forge/skills
  # anthropics/skills: pdf, docx, pptx, xlsx, webapp-testing, mcp-builder, canvas-design,
  #   doc-coauthoring, algorithmic-art, frontend-design, brand-guidelines, theme-factory,
  #   web-artifacts-builder, internal-comms, slack-gif-creator, skill-creator, claude-api
  - git clone --depth=1 https://github.com/anthropics/skills /tmp/anthropics-skills 2>/dev/null; cp -r /tmp/anthropics-skills/skills/. ~/forge/skills/; rm -rf /tmp/anthropics-skills
  # obra/superpowers: test-driven-development, systematic-debugging, writing-plans,
  #   executing-plans, brainstorming, requesting-code-review, receiving-code-review,
  #   verification-before-completion, subagent-driven-development, dispatching-parallel-agents,
  #   using-git-worktrees, finishing-a-development-branch, writing-skills, using-superpowers
  - git clone --depth=1 https://github.com/obra/superpowers /tmp/obra-superpowers 2>/dev/null; cp -r /tmp/obra-superpowers/skills/. ~/forge/skills/; rm -rf /tmp/obra-superpowers
  # vercel-labs/agent-skills: deploy-to-vercel, vercel-react-best-practices, web-design-guidelines,
  #   vercel-composition-patterns, vercel-react-native-skills, vercel-react-view-transitions, vercel-cli-with-tokens
  - git clone --depth=1 https://github.com/vercel-labs/agent-skills /tmp/vercel-agent-skills 2>/dev/null; for d in /tmp/vercel-agent-skills/skills/*/; do [ -f "$d/SKILL.md" ] && cp -r "$d" ~/forge/skills/; done; rm -rf /tmp/vercel-agent-skills
  # vercel-labs/next-skills: next-best-practices, next-cache-components, next-upgrade
  - git clone --depth=1 https://github.com/vercel-labs/next-skills /tmp/vercel-next-skills 2>/dev/null; cp -r /tmp/vercel-next-skills/skills/. ~/forge/skills/; rm -rf /tmp/vercel-next-skills
  # antfu/skills: vue, vite, vitest, nuxt, pinia, pnpm, slidev, tsdown, turborepo, unocss,
  #   vitepress, vueuse-functions, vue-best-practices, vue-router-best-practices,
  #   vue-testing-best-practices, web-design-guidelines, antfu
  - git clone --depth=1 https://github.com/antfu/skills /tmp/antfu-skills 2>/dev/null; cp -r /tmp/antfu-skills/skills/. ~/forge/skills/; rm -rf /tmp/antfu-skills
  # coreyhaines31/marketingskills: seo-audit, copywriting, content-strategy, analytics-tracking,
  #   marketing-psychology, ad-creative, social-content, email-sequence, cold-email, launch-strategy,
  #   pricing-strategy, programmatic-seo, competitor-alternatives, customer-research, referral-program,
  #   lead-magnets, free-tool-strategy, marketing-ideas, copy-editing, product-marketing-context,
  #   sales-enablement, site-architecture, revops, schema-markup, ab-test-setup, paid-ads,
  #   form-cro, page-cro, onboarding-cro, paywall-upgrade-cro, popup-cro, signup-flow-cro,
  #   churn-prevention, ai-seo
  - git clone --depth=1 https://github.com/coreyhaines31/marketingskills /tmp/marketing-skills 2>/dev/null; cp -r /tmp/marketing-skills/skills/. ~/forge/skills/; rm -rf /tmp/marketing-skills
  # supabase/agent-skills: supabase-postgres-best-practices
  - git clone --depth=1 https://github.com/supabase/agent-skills /tmp/supabase-skills 2>/dev/null; cp -r /tmp/supabase-skills/skills/. ~/forge/skills/; rm -rf /tmp/supabase-skills
  # shadcn/ui: shadcn
  - git clone --depth=1 https://github.com/shadcn/ui /tmp/shadcn-ui 2>/dev/null; cp -r /tmp/shadcn-ui/skills/. ~/forge/skills/; rm -rf /tmp/shadcn-ui
  # vercel/turborepo: turborepo
  - git clone --depth=1 https://github.com/vercel/turborepo /tmp/vercel-turborepo 2>/dev/null; cp -r /tmp/vercel-turborepo/skills/. ~/forge/skills/; rm -rf /tmp/vercel-turborepo
  # vercel/ai: ai-sdk, add-function-examples, add-provider-package, adr-skill,
  #   capture-api-response-test-fixture, develop-ai-functions-example, list-npm-package-content,
  #   update-provider-models
  - git clone --depth=1 https://github.com/vercel/ai /tmp/vercel-ai-sdk 2>/dev/null; cp -r /tmp/vercel-ai-sdk/skills/. ~/forge/skills/; rm -rf /tmp/vercel-ai-sdk
  - FORGE_DEBUG_REQUESTS='{{dir}}/context.json' FORGE_PROVIDER='open_router' FORGE_MODEL='{{model}}' /Users/amit/code-forge/target/debug/forge -p '{{task}}'

parallelism: 3
timeout: 240
early_exit: false

validations:
  - name: "Uses skill_search tool"
    type: shell
    command: |
      cat '{{dir}}/context.json' | jq -e '[.messages[]?.tool_calls[]? | select(.function.name == "skill_search")] | any' > /dev/null 2>&1 || {
        echo "✗ FAILED: skill_search tool was not called"
        exit 1
      }
      echo "✓ skill_search tool was called"

  - name: "skill_search did not error"
    type: shell
    command: |
      response_text=$(cat '{{dir}}/context.json' | jq -r '
        .messages[]? |
        select(.role == "tool" and .name == "skill_search") |
        .content' 2>/dev/null | head -1)

      if [ -z "$response_text" ] || [ "$response_text" = "null" ]; then
        echo "✗ FAILED: no skill_search tool response found in context"
        exit 1
      fi

      if echo "$response_text" | grep -q "tool_call_error"; then
        echo "✗ FAILED: skill_search returned an error:"
        echo "$response_text" | head -10
        exit 1
      fi

      echo "✓ skill_search returned a valid response"

  - name: "Expected skills returned (if specified)"
    type: shell
    command: |
      if [ -z "{{expected_skills}}" ]; then
        echo "No expected skills specified, skipping check"
        exit 0
      fi

      # Output format: <skill_search_results count="N"><skill name="foo">desc</skill>...</skill_search_results>
      results=$(cat '{{dir}}/context.json' | jq -r '
        .messages[]? |
        select(.role == "tool" and .name == "skill_search") |
        .content' 2>/dev/null | grep -oP 'name="\K[^"]+' | head -20)

      if [ -z "$results" ]; then
        echo "✗ FAILED: could not extract skill names from skill_search results"
        cat '{{dir}}/context.json' | jq -r '
          .messages[]? |
          select(.role == "tool" and .name == "skill_search") |
          .content' 2>/dev/null | head -5
        exit 1
      fi

      echo "Skills returned: $(echo "$results" | tr '\n' ' ')"

      IFS=',' read -ra EXPECTED <<< "{{expected_skills}}"
      missing_skills=()
      for expected in "${EXPECTED[@]}"; do
        expected=$(echo "$expected" | xargs)
        if ! echo "$results" | grep -qF "$expected"; then
          missing_skills+=("$expected")
        fi
      done

      if [ ${#missing_skills[@]} -gt 0 ]; then
        echo "✗ FAILED: missing expected skills in results:"
        printf '  - %s\n' "${missing_skills[@]}"
        exit 1
      fi

      echo "✓ All expected skills found in results"

  - name: "Must-be-first skill ranked #1"
    type: shell
    command: |
      if [ -z "{{must_be_first}}" ]; then
        echo "No must_be_first requirement, skipping check"
        exit 0
      fi

      first_skill=$(cat '{{dir}}/context.json' | jq -r '
        .messages[]? |
        select(.role == "tool" and .name == "skill_search") |
        .content' 2>/dev/null | grep -oP 'name="\K[^"]+' | head -1)

      if [ -z "$first_skill" ]; then
        echo "✗ FAILED: could not extract first skill from skill_search results"
        exit 1
      fi

      expected_first="{{must_be_first}}"

      if [ "$first_skill" != "$expected_first" ]; then
        echo "✗ FAILED: first skill mismatch"
        echo "  Expected: $expected_first"
        echo "  Actual:   $first_skill"
        exit 1
      fi

      echo "✓ Must-be-first skill is correctly ranked #1: $first_skill"


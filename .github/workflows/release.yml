name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  release:
    name: Create Release
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${TAG}"
          else
            RANGE=""
          fi

          generate_section() {
            local title="$1"
            local pattern="$2"
            local commits
            commits=$(git log --pretty=format:"- %s (%h)" "${RANGE}" | { grep -E "^- ${pattern}" || true; } | head -n50)
            if [ -n "$commits" ]; then
              echo "### ${title}"
              echo "${commits}"
              echo ""
            fi
          }

          NOTES=""
          NOTES+="$(generate_section "Features" "feat[(:]")"
          NOTES+="$(generate_section "Fixes" "fix[(:]")"
          NOTES+="$(generate_section "Documentation" "docs[(:]")"
          NOTES+="$(generate_section "Refactoring" "refactor[(:]")"
          NOTES+="$(generate_section "Tests" "test[(:]")"
          NOTES+="$(generate_section "Chores" "chore[(:]")"

          OTHER=$(git log --pretty=format:"- %s (%h)" "${RANGE}" | { grep -vE "^- (feat|fix|docs|refactor|test|chore)[(:]" || true; } | head -n50)
          if [ -n "$OTHER" ]; then
            NOTES+=$'\n'"### Other Changes"
            NOTES+=$'\n'"${OTHER}"
            NOTES+=$'\n'
          fi

          if [ -z "$NOTES" ]; then
            NOTES="No conventional commits found in this release."
          fi

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build Release Binary
        run: |
          cargo build --release --workspace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/forge
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false

      - name: Publish workspace crates to crates.io
        run: |
          for crate in $(find crates -maxdepth 2 -name Cargo.toml | xargs -I{} sh -c 'dirname {}'); do
            echo "Publishing ${crate}..."
            cargo publish --manifest-path "${crate}/Cargo.toml" --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          done
        continue-on-error: true

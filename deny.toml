# Phenotype forgecode — Cargo Deny Configuration
# https://github.com/KooshaPari/forgecode

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
    "Unicode-3.0",
    "BSL-1.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
]

[advisories]
db-path = "$CARGO_HOME/advisory-db"
ignore = [
    { id = "RUSTSEC-2026-0118" },
    { id = "RUSTSEC-2026-0119" },
    { id = "RUSTSEC-2026-0049" },
    { id = "RUSTSEC-2026-0098" },
    { id = "RUSTSEC-2026-0099" },
    { id = "RUSTSEC-2026-0104" },
]

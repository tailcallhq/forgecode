# CachyOS-style compiler flags for forge package builds.
# Installed into /etc/makepkg.conf.d/ by scripts/build-cachyos-pkg.sh and CI.
# TARGET_CPU is substituted at install time (default: x86-64-v3).

CARCH="x86_64"
CHOST="x86_64-pc-linux-gnu"
CFLAGS="-march=@TARGET_CPU@ -mtune=generic -O3 -pipe -fno-plt -fexceptions \
        -Wp,-D_FORTIFY_SOURCE=3 -Wformat -Werror=format-security \
        -fstack-clash-protection -fcf-protection \
        -fno-omit-frame-pointer -mno-omit-leaf-frame-pointer -g1"
CXXFLAGS="${CFLAGS}"
LDFLAGS="-Wl,-O1 -Wl,--sort-common -Wl,--as-needed -Wl,-z,relro -Wl,-z,now \
         -Wl,-z,pack-relative-relocs"
RUSTFLAGS="-C target-cpu=@TARGET_CPU@ -C opt-level=3 -C codegen-units=1 -C lto=fat"
MAKEFLAGS="-j$(nproc)"